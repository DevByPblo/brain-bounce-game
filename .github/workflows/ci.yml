name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ui-checks:
    name: UI checks (vitest + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run test
      - run: bun run build

  coop-stress-test:
    name: 10-player co-op stress test
    runs-on: ubuntu-latest
    needs: ui-checks
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install stress-test deps
        run: npm install --no-save @supabase/supabase-js@^2.103.3
      - name: Run 10-player co-op stress test
        run: node scripts/coop-stress-test.mjs
        timeout-minutes: 10